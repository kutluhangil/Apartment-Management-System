version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cumhuriyet-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=https://yourdomain.com  # Replace with your actual domain
    volumes:
      # Named volume keeps uploaded invoice files across container rebuilds
      - uploads_data:/app/uploads
    expose:
      - "3001"   # Internal only — not exposed to the host network
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cumhuriyet-frontend
    restart: unless-stopped
    ports:
      - "80:80"   # Only frontend is exposed — backend is internal only
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  uploads_data:
    driver: local
    # On the Mac Mini, this persists to /var/lib/docker/volumes/uploads_data/_data

networks:
  app-network:
    driver: bridge
